services:
  - type: web
    name: clawwork-backend
    env: docker
    plan: free
    buildCommand: pip install -r requirements.txt && cd frontend && npm install && npm run build && cd ..
    startCommand: python -m uvicorn livebench.api.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        scope: build,runtime
        sync: false
      - key: DEEPSEEK_API_BASE
        value: https://api.deepseek.com/v1
      - key: AGENT_MODEL
        value: deepseek-chat
      - key: EVALUATION_MODEL
        value: deepseek-chat
      - key: CODE_SANDBOX_PROVIDER
        value: boxlite
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info